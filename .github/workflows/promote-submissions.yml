name: Promote submissions to catalog

# When the Worker commits a new submission (or a delete request), sync the
# Bosch Part Scout catalog: add/update parts and their photos, or remove
# parts that were deleted.

on:
  push:
    branches: [main]
    paths:
      - 'submissions/data/**'
      - 'submissions/deletes/**'
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout queue repo
        uses: actions/checkout@v4
        with:
          path: queue

      - name: Checkout scout (catalog) repo
        uses: actions/checkout@v4
        with:
          repository: fastcashsignals/bosch-part-scout
          token: ${{ secrets.SCOUT_REPO_TOKEN }}
          path: scout

      - name: Sync submissions into the catalog
        run: python3 queue/scripts/promote_submissions.py

      - name: Commit and push catalog changes
        working-directory: scout
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Sync catalog from submissions [auto]"
            git push
          else
            echo "No catalog changes."
          fi
